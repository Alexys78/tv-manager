<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Manager - Audiences</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>
  <main class="game-layout">
    <section class="game-card">
      <header id="appHeader" data-active-page="audiences"></header>

      <h1>Audiences de la veille</h1>

      <div class="game-block">
        <h2>Classement des chaînes</h2>
        <div id="audienceRanking" class="ranking-list"></div>
      </div>

      <div class="game-block">
        <div class="chart-head">
          <h2>Évolution des audiences (30 min)</h2>
          <div class="chart-zoom-controls">
            <button id="zoomOutChartBtn" type="button" class="secondary-btn chart-zoom-btn">-</button>
            <span id="chartZoomLabel" class="day-badge">100%</span>
            <button id="zoomInChartBtn" type="button" class="secondary-btn chart-zoom-btn">+</button>
          </div>
        </div>
        <div id="audienceChartLegend" class="audience-chart-legend"></div>
        <div id="audienceChartWrap" class="audience-chart-wrap">
          <svg id="audienceChart" class="audience-chart" aria-label="Graphique des audiences"></svg>
        </div>
      </div>

      <div class="game-block">
        <h2>Détail par créneau (30 min)</h2>
        <div id="audienceDetails" class="audience-table-wrap"></div>
      </div>
    </section>
  </main>
  <script src="storage-runtime.js"></script>
  <script src="cloud-defaults.js"></script>
  <script src="cloud-config.js"></script>
  <script src="session-utils.js"></script>
  <script src="core/state-schema.js"></script>
  <script src="core/storage-adapter.js"></script>
  <script src="core/store.js"></script>
  <script src="core/bootstrap.js"></script>
  <script src="sync-cloud.js"></script>
  <script src="common-header.js"></script>
  <script src="diffusion-rules.js"></script>
  <script src="program-catalog.js"></script>
  <script src="audience-engine.js"></script>
  <script src="audience-results.js"></script>
  <script src="bank.js"></script>
  <script src="audiences.js"></script>
</body>
</html>
