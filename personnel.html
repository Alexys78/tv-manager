<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Manager - Mon personnel</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>
  <main class="game-layout">
    <section class="game-card">
      <header id="appHeader" data-active-page="personnel-owned"></header>

      <h1>Mon personnel</h1>

      <section class="game-block">
        <div class="today-head">
          <h2>Présentateurs</h2>
          <span id="personnelOwnedCount" class="day-badge">0</span>
        </div>

        <div class="presenters-toolbar">
          <input id="personnelSearchInput" type="search" placeholder="Rechercher un présentateur..." />
          <select id="personnelSpecialtySelect">
            <option value="all">Toutes les spécialités</option>
          </select>
        </div>

        <div id="personnelOwnedList" class="studio-presenters-list"></div>
        <p id="personnelFeedback" class="feedback"></p>
      </section>
    </section>
  </main>

  <div id="firePresenterModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="firePresenterModalTitle">
    <article class="modal-card">
      <h2 id="firePresenterModalTitle">Licencier un présentateur</h2>
      <div id="firePresenterModalBody" class="modal-body-text"></div>
      <div class="modal-actions">
        <button id="cancelFirePresenterBtn" type="button" class="secondary-btn">Annuler</button>
        <button id="confirmFirePresenterBtn" type="button" class="market-buy-btn market-sell-btn">Confirmer le licenciement</button>
      </div>
    </article>
  </div>

  <script src="storage-runtime.js"></script>
  <script src="cloud-defaults.js"></script>
  <script src="cloud-config.js"></script>
  <script src="session-utils.js"></script>
  <script src="core/state-schema.js"></script>
  <script src="core/storage-adapter.js"></script>
  <script src="core/store.js"></script>
  <script src="core/bootstrap.js"></script>
  <script src="sync-cloud.js"></script>
  <script src="common-header.js"></script>
  <script src="bank.js"></script>
  <script src="finance.js"></script>
  <script src="presenter-engine.js"></script>
  <script src="personnel.js"></script>
</body>
</html>
