<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Manager - Recrutement</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>
  <main class="game-layout">
    <section class="game-card">
      <header id="appHeader" data-active-page="personnel-recruitment"></header>

      <h1>Recrutement</h1>

      <div class="presenters-layout">
        <section class="game-block">
          <div class="today-head">
            <h2>Présentateurs disponibles</h2>
            <span id="presentersMarketCount" class="day-badge">0</span>
          </div>

          <div class="presenters-toolbar">
            <input id="presentersSearchInput" type="search" placeholder="Rechercher un présentateur..." />
            <select id="presentersSpecialtySelect">
              <option value="all">Toutes les spécialités</option>
            </select>
          </div>

          <div id="presentersMarketList" class="studio-presenters-list"></div>
          <p id="presentersFeedback" class="feedback" aria-live="polite"></p>
        </section>
      </div>
    </section>
  </main>

  <script src="storage-runtime.js"></script>
  <script src="cloud-defaults.js"></script>
  <script src="cloud-config.js"></script>
  <script src="session-utils.js"></script>
  <script src="core/state-schema.js"></script>
  <script src="core/storage-adapter.js"></script>
  <script src="core/store.js"></script>
  <script src="core/bootstrap.js"></script>
  <script src="sync-cloud.js"></script>
  <script src="common-header.js"></script>
  <script src="bank.js"></script>
  <script src="finance.js"></script>
  <script src="presenter-engine.js"></script>
  <script src="presenters.js"></script>
</body>
</html>
