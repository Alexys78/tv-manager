<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Manager - Régie pub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>
  <main class="game-layout">
    <section class="game-card">
      <header id="appHeader" data-active-page="ad-regie"></header>

      <h1>Régie publicitaire</h1>

      <div class="game-block">
        <h2>Rapport veille</h2>
        <div id="adComplianceKpi" class="finance-kpi-row finance-kpi-row-3"></div>
      </div>

      <div class="game-block">
        <div class="today-head">
          <h2>Grille pub</h2>
          <div id="adPressureButtons" class="filter-chip-row"></div>
        </div>
        <p id="adGridPublicationHint" class="ad-regie-help"></p>
        <div class="ad-grid-3" id="adThreeDayGrid"></div>
        <div class="ad-grid-actions">
          <button id="adValidateGridBtn" type="button">Valider</button>
          <button id="adDisableAllBtn" type="button" class="secondary-btn">Désactiver toutes les pubs</button>
          <button id="adEnableAllBtn" type="button" class="secondary-btn">Réactiver toutes les pubs</button>
        </div>
        <p id="adGridFeedback" class="feedback" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="storage-runtime.js"></script>
  <script src="cloud-defaults.js"></script>
  <script src="cloud-config.js"></script>
  <script src="session-utils.js"></script>
  <script src="core/state-schema.js"></script>
  <script src="core/storage-adapter.js"></script>
  <script src="core/store.js"></script>
  <script src="core/bootstrap.js"></script>
  <script src="sync-cloud.js"></script>
  <script src="common-header.js"></script>
  <script src="bank.js"></script>
  <script src="diffusion-rules.js"></script>
  <script src="program-catalog.js"></script>
  <script src="audience-results.js"></script>
  <script src="finance.js"></script>
  <script src="regie-pub.js"></script>
</body>
</html>
